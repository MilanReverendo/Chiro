<aside
  [class.w-64]="!collapsed()"
  [class.w-16]="collapsed()"
  class="relative flex flex-col min-h-screen bg-[var(--color-primary-blue)] border-r-2 border-[var(--color-primary-red)]/30 transition-all duration-300 ease-in-out">

  <!-- Top: Logo area -->
  <div class="flex items-center h-20 px-4 border-b-2 border-[var(--color-primary-red)]/20 overflow-hidden">
    <div class="flex items-center gap-3 min-w-0">
      <div class="shrink-0 w-8 h-8 rounded-lg bg-[var(--color-primary-red)] flex items-center justify-center shadow-lg shadow-[var(--color-primary-red)]/30">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.43l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
        </svg>
      </div>
      @if (!collapsed()) {
        <span class="text-white font-black text-base tracking-tight whitespace-nowrap">
          Admin <span class="text-[var(--color-primary-red)]">Panel</span>
        </span>
      }
    </div>
  </div>

  <!-- Nav Items -->
  <!-- Nav Items -->
  <nav class="flex-1 py-6 px-2 flex flex-col gap-1">
    @for (item of navItems; track item.route) {

      <a [routerLink]="item.route"
        routerLinkActive="bg-[var(--color-primary-red)]/15 text-white border-l-2 border-[var(--color-primary-red)]"
        [routerLinkActiveOptions]="{ exact: true }"
        class="group flex items-center gap-3 px-3 py-3 rounded-xl text-white/50 hover:text-white hover:bg-white/5 border-l-2 border-transparent transition-all duration-200 overflow-hidden"
        [title]="collapsed() ? item.label : ''">

        <!-- Icon -->
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"
           class="w-5 h-5 shrink-0 transition-transform duration-200 group-hover:scale-110">
        <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="item.icon" />
      </svg>

      <!-- Label -->
      @if (!collapsed()) {
        <span class="text-sm font-bold uppercase tracking-widest whitespace-nowrap">
          {{ item.label }}
        </span>
      }

      </a>
    }
  </nav>

  <!-- Collapse toggle -->
  <div class="px-2 pb-4">
    <button
      (click)="collapsed.set(!collapsed())"
      class="w-full flex items-center justify-center gap-2 px-3 py-2.5 rounded-xl text-white/30 hover:text-white hover:bg-white/5 transition-all duration-200"
      [title]="collapsed() ? 'Uitklappen' : 'Inklappen'">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
           class="w-4 h-4 shrink-0 transition-transform duration-300"
           [class.rotate-180]="collapsed()">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" />
      </svg>
      @if (!collapsed()) {
        <span class="text-xs font-semibold uppercase tracking-widest">Inklappen</span>
      }
    </button>
  </div>

</aside>
