<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4">
  <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-xl shadow-lg">

    <div class="text-center">
      <h2 class="text-3xl font-extrabold text-gray-900">Login to Chiro</h2>
      <p class="mt-2 text-sm text-gray-600 font-medium">Please enter your credentials</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="mt-8 space-y-6">

      <div class="space-y-4">
        <div>
          <label for="username" class="block text-sm font-semibold text-gray-700">Username</label>
          <input
            id="username"
            type="text"
            formControlName="username"
            class="mt-1 block w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
            placeholder="johndoe"
          />
        </div>

        <div>
          <label for="password" class="block text-sm font-semibold text-gray-700">Password</label>
          <input
            id="password"
            type="password"
            formControlName="password"
            class="mt-1 block w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
            placeholder="••••••••"
          />
        </div>
      </div>

      @if (errorMessage()) {
        <div class="p-3 rounded-lg bg-red-50 border border-red-200 text-red-600 text-sm animate-pulse">
          <span class="font-bold">Error:</span> {{ errorMessage() }}
        </div>
      }

      <button
        type="submit"
        [disabled]="loginForm.invalid || isLoading()"
        class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
      >
        @if (isLoading()) {
          <svg class="animate-spin h-5 w-5 mr-3 text-white" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          Logging in...
        } @else {
          Login
        }
      </button>

    </form>
  </div>
</div>
