<div class="bg-white rounded-2xl shadow-md border border-slate-100 p-8">
  <h2 class="text-2xl font-black text-[var(--color-primary-blue)] mb-6">Stuur ons een bericht</h2>

  <form [formGroup]="contactForm()!" (ngSubmit)="submitContactForm.emit($event)" class="flex flex-col gap-4">

    <div>
      <label for="name" class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-1">Naam</label>
      <input type="text" id="name" name="name" formControlName="name"
             class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:border-[var(--color-primary-red)] focus:ring-2 focus:ring-[var(--color-primary-red)]/20 outline-none text-sm font-semibold text-[var(--color-primary-blue)] transition-all">
    </div>

    <div>
      <label for="email" class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-1">Email</label>
      <input type="email" id="email" name="email" formControlName="email"
             class="w-full px-4 py-2.5 rounded-xl border border-slate-200 [&.ng-invalid.ng-touched]:border-pink-500
              [&.ng-invalid.ng-touched]:ring-2
            [&.ng-invalid.ng-touched]:ring-pink-500/20
             focus:border-[var(--color-primary-red)] focus:ring-2 focus:ring-[var(--color-primary-red)]/20 outline-none text-sm font-semibold text-[var(--color-primary-blue)] transition-all">
    </div>

    <div>
      <label for="message" class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-1">Bericht</label>
      <textarea name="message" id="message"  rows="5" formControlName="message"
                class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:border-[var(--color-primary-red)] focus:ring-2 focus:ring-[var(--color-primary-red)]/20 outline-none text-sm text-[var(--color-primary-blue)] transition-all resize-none"></textarea>
    </div>

    <button type="submit" [disabled]="contactForm()!.invalid"
            class="mt-4 px-6 py-2.5 bg-[var(--color-primary-red)] hover:bg-[#c1121f] text-white text-sm font-black uppercase tracking-widest rounded-xl shadow-md shadow-[var(--color-primary-red)]/30 transition-all active:scale-95 disabled:cursor-not-allowed disabled:text-slate-500 disabled:bg-slate-300">
      Verstuur
    </button>
  </form>
</div>
